<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lock Apps Promo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #FAF6F0;
  }

  .container {
    width: 100%;
    height: 100%;
    background: linear-gradient(165deg, #FF8A4A 0%, #FF6A1A 35%, #E55A12 70%, #C44A0A 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Soft radial glow */
  .container::before {
    content: '';
    position: absolute;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 95px);
    gap: 20px;
    transform: rotate(-8deg);
    position: relative;
  }

  .app {
    position: relative;
    width: 95px;
    height: 95px;
  }

  .app-icon {
    width: 100%;
    height: 100%;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 120px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    position: relative;
    overflow: hidden;
  }

  .lock-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 30px;
    height: 30px;
    background: #FFFFFF;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 2;
  }

  .lock-badge svg {
    width: 15px;
    height: 15px;
  }

  /* App icon colors - mimicking real apps */
  .whatsapp { background: linear-gradient(135deg, #25D366, #128C7E); }
  .instagram { background: linear-gradient(135deg, #F58529, #DD2A7B, #8134AF, #515BD4); }
  .photos { background: linear-gradient(135deg, #FFFFFF, #F0F0F0); border: 1px solid #E0E0E0; }
  .tinder { background: linear-gradient(135deg, #FF6B6B, #FE3C72); }
  .tiktok { background: linear-gradient(135deg, #010101, #1a1a1a); }
  .notes { background: linear-gradient(135deg, #FFCC02, #FFB800); }
  .facebook { background: linear-gradient(135deg, #1877F2, #1565D8); }
  .youtube { background: linear-gradient(135deg, #FFFFFF, #F8F8F8); border: 1px solid #E0E0E0; }
  .twitter { background: linear-gradient(135deg, #1A1A1A, #000000); }
  .snapchat { background: linear-gradient(135deg, #FFFC00, #FFE600); }
  .reddit { background: linear-gradient(135deg, #FF4500, #FF5722); }
  .discord { background: linear-gradient(135deg, #5865F2, #4752C4); }

  .app-icon .icon-inner {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* SVG icons inside app tiles */
  .app-icon svg.app-svg {
    width: 52px;
    height: 52px;
  }

  .app-icon svg.app-svg-sm {
    width: 44px;
    height: 44px;
  }
</style>
