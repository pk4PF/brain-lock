<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainlock iPad App Store Screenshots</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #14110E; padding: 40px 20px 80px; }

  .header { text-align: center; margin-bottom: 36px; }
  .header h1 { color: #fff; font-size: 26px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
  .header p { color: #8A8278; font-size: 13px; }
  .header .accent { color: #FF6A1A; }

  .grid { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; }
  .card { text-align: center; }
  .card .label {
    color: #8A8278; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;
  }

  /* Master is 2064x2752 (iPad 13"), scaled by 320/2064 = 0.15504 */
  .preview-wrap {
    width: 320px;
    height: 427px;
    overflow: hidden;
    border-radius: 16px;
    border: 1px solid #2A2620;
    position: relative;
    background: #1a1a1a;
  }
  .ss {
    width: 2064px;
    height: 2752px;
    transform: scale(0.15504);
    transform-origin: top left;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .blob { position: absolute; border-radius: 50%; pointer-events: none; }

  /* Caption band */
  .top-area {
    position: relative;
    z-index: 2;
    padding: 150px 180px 0;
    text-align: center;
    flex-shrink: 0;
  }
  .top-area h2 {
    font-size: 132px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -4px;
  }
  .top-area p {
    font-size: 50px;
    font-weight: 500;
    margin-top: 30px;
    letter-spacing: -0.5px;
  }

  /* iPad mockup, centred in the space below the caption */
  .pad-area {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px 0 90px;
    overflow: hidden;
  }
  .pad-frame {
    width: 1560px;
    height: 2050px; /* default ≈ iPad aspect; JS resizes to match upload */
    background: #0C0C0E;
    border-radius: 56px;
    padding: 20px;
    overflow: hidden;
    box-shadow: 0 30px 110px rgba(0,0,0,0.28);
    position: relative;
  }
  .pad-frame .screen {
    width: 100%;
    height: 100%;
    border-radius: 40px;
    overflow: hidden;
    background: #FAF6F0;
  }
  .pad-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
  .pad-frame .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #F4EFE7;
    color: #B8AE9F;
    font-size: 60px;
    font-weight: 600;
    gap: 28px;
  }
  .pad-frame .placeholder .upload-icon { font-size: 120px; opacity: 0.45; }

  /* Brand themes */
  .bg-cream { background: #FAF6F0; }
  .bg-cream .top-area h2 { color: #1A1208; }
  .bg-cream .top-area p { color: #8A7E70; }
  .bg-cream .accent { color: #FF6A1A; }

  .bg-orange { background: linear-gradient(170deg, #FF7A2E 0%, #F2660E 100%); }
  .bg-orange .top-area h2 { color: #FFFFFF; }
  .bg-orange .top-area p { color: rgba(255,255,255,0.88); }
  .bg-orange .accent { color: #FFE0CB; }

  /* Buttons */
  .btn-row { margin-top: 12px; display: flex; gap: 8px; justify-content: center; }
  .dl-btn {
    background: #FF6A1A; color: #fff; border: none;
    padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: background 0.15s;
  }
  .dl-btn:hover { background: #E55A12; }
  .dl-btn:disabled { opacity: 0.5; cursor: wait; }
  .upload-btn {
    background: #221E18; color: #C9BFB0;
    border: 1px solid #383229;
    padding: 10px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.15s;
  }
  .upload-btn:hover { background: #322C24; color: #fff; border-color: #554C3F; }
  .upload-input { display: none; }

  .download-all-wrap { text-align: center; margin-top: 40px; }
  .download-all {
    background: linear-gradient(135deg, #FF7A2E, #E55A12);
    color: #fff; border: none;
    padding: 16px 48px; border-radius: 12px;
    font-size: 16px; font-weight: 800; cursor: pointer;
    font-family: 'Inter', sans-serif; letter-spacing: 0.3px;
    transition: transform 0.15s;
  }
  .download-all:hover { transform: scale(1.03); }
  .download-all:disabled { opacity: 0.5; cursor: wait; transform: none; }

  .status { text-align: center; margin-top: 16px; color: #8A8278; font-size: 13px; min-height: 20px; }

  .size-row { margin-top: 16px; display: flex; gap: 10px; justify-content: center; align-items: center; }
  .size-row label { color: #8A8278; font-size: 12px; font-weight: 600; }
  #sizeSel {
    background: #221E18; color: #E8DECE; border: 1px solid #383229;
    border-radius: 8px; padding: 8px 12px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Brainlock iPad App Store Screenshots</h1>
  <p>Upload an <span class="accent">iPad</span> screenshot into each slot, pick a size, then download. Capture on an iPad simulator (13").</p>
  <div class="size-row">
    <label for="sizeSel">Display size</label>
    <select id="sizeSel"></select>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="download-all-wrap">
  <button class="download-all" id="dlAllBtn" onclick="downloadAll()">Download All PNGs</button>
</div>
<div class="status" id="status"></div>

<script>
// Same four captions as the iPhone set, for a consistent listing.
const SCREENS = [
  {
    label: 'Score',
    bg: 'orange',
    title: 'Less brain rot.<br><span class="accent">More brainpower.</span>',
    sub: 'One Brainpower Score, built over time.',
    file: 'Brainlock-iPad-01-Score.png',
  },
  {
    label: 'Block',
    bg: 'cream',
    title: 'Lock the apps<br>that <span class="accent">rot your brain.</span>',
    sub: 'One tap to block. They stay locked.',
    file: 'Brainlock-iPad-02-Block.png',
  },
  {
    label: 'Brain Gym',
    bg: 'orange',
    title: 'Train it back<br>to <span class="accent">sharp.</span>',
    sub: '15+ brain games. A fresh workout every day.',
    file: 'Brainlock-iPad-03-Gym.png',
  },
  {
    label: 'Unlock',
    bg: 'cream',
    title: 'Scroll only<br>when <span class="accent">you choose.</span>',
    sub: 'Unlocking costs Brainpower, so you reach for it less.',
    file: 'Brainlock-iPad-04-Unlock.png',
  },
];

// Designed once at 2064x2752; export scales to the chosen 13" dimensions.
const DESIGN_W = 2064, DESIGN_H = 2752;
const SIZES = [
  { label: '13" (2064 × 2752)', w: 2064, h: 2752 },
  { label: '12.9" (2048 × 2732)', w: 2048, h: 2732 },
];
function outSize() {
  const i = +document.getElementById('sizeSel').value || 0;
  return SIZES[i];
}
function buildSizeSelect() {
  document.getElementById('sizeSel').innerHTML =
    SIZES.map((s, i) => `<option value="${i}">${s.label}</option>`).join('');
}

function blobsFor(bg) {
  if (bg === 'orange') {
    return `
      <div class="blob" style="top:-340px;right:-240px;width:1040px;height:1040px;background:rgba(255,255,255,0.10);"></div>
      <div class="blob" style="bottom:180px;left:-300px;width:780px;height:780px;background:rgba(255,255,255,0.07);"></div>`;
  }
  return `
    <div class="blob" style="top:-300px;right:-220px;width:960px;height:960px;background:rgba(255,106,26,0.12);"></div>
    <div class="blob" style="top:1200px;left:-320px;width:780px;height:780px;background:rgba(255,106,26,0.08);"></div>`;
}

function buildCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = SCREENS.map((s, i) => {
    const n = i + 1;
    return `
    <div class="card">
      <div class="label">${n}. ${s.label}</div>
      <div class="preview-wrap">
        <div class="ss bg-${s.bg}" id="ss${n}">
          ${blobsFor(s.bg)}
          <div class="top-area">
            <h2>${s.title}</h2>
            <p>${s.sub}</p>
          </div>
          <div class="pad-area">
            <div class="pad-frame">
              <div class="screen" id="pad${n}">
                <div class="placeholder" id="ph${n}">
                  <div class="upload-icon">📱</div>
                  <span>Upload iPad screenshot</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="upload-btn" onclick="document.getElementById('file${n}').click()">Choose image</button>
        <input type="file" class="upload-input" id="file${n}" accept="image/*" onchange="loadImage(${n}, this)">
        <button class="dl-btn" onclick="download('ss${n}','${s.file}', this)">Download PNG</button>
      </div>
    </div>`;
  }).join('');
}

function loadImage(num, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const screen = document.getElementById('pad' + num);
    const placeholder = document.getElementById('ph' + num);
    if (placeholder) placeholder.remove();
    const existingImg = screen.querySelector('img');
    if (existingImg) existingImg.remove();
    const img = document.createElement('img');
    // Resize the iPad frame to the screenshot's exact aspect ratio so it's
    // never stretched (html2canvas ignores object-fit on export).
    img.onload = function() {
      const aspect = img.naturalWidth / img.naturalHeight;
      const frame = screen.parentElement;          // .pad-frame
      const screenW = frame.clientWidth - 40;       // minus bezel padding
      frame.style.height = Math.round(screenW / aspect + 40) + 'px';
    };
    img.src = e.target.result;
    screen.appendChild(img);
    setStatus('Screenshot ' + num + ' loaded.');
  };
  reader.readAsDataURL(file);
}

async function download(id, filename, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }
  setStatus('Rendering ' + filename + '…');

  const el = document.getElementById(id);
  const wrap = el.parentElement;
  const out = outSize();
  const outName = filename.replace(/\.png$/i, `-${out.w}x${out.h}.png`);
  const origTransform = el.style.transform;
  const origWidth = wrap.style.width;
  const origHeight = wrap.style.height;
  const origOverflow = wrap.style.overflow;

  el.style.transform = 'none';
  wrap.style.width = DESIGN_W + 'px';
  wrap.style.height = DESIGN_H + 'px';
  wrap.style.overflow = 'visible';

  try {
    const canvas = await html2canvas(el, {
      width: DESIGN_W, height: DESIGN_H, scale: 2,
      useCORS: true, backgroundColor: null, logging: false,
    });
    // App Store rejects PNGs with an alpha channel — flatten onto white,
    // scaling the render to the chosen export dimensions.
    const opaque = document.createElement('canvas');
    opaque.width = out.w; opaque.height = out.h;
    const ctx = opaque.getContext('2d');
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, out.w, out.h);
    ctx.drawImage(canvas, 0, 0, out.w, out.h);

    const link = document.createElement('a');
    link.download = outName;
    link.href = opaque.toDataURL('image/png');
    link.click();
    setStatus(outName + ' saved.');
  } catch (e) {
    alert('Error generating ' + filename + ': ' + e.message);
    setStatus('Error: ' + e.message);
  }

  el.style.transform = origTransform;
  wrap.style.width = origWidth;
  wrap.style.height = origHeight;
  wrap.style.overflow = origOverflow;

  if (btn) { btn.disabled = false; btn.textContent = 'Download PNG'; }
}

async function downloadAll() {
  const btn = document.getElementById('dlAllBtn');
  btn.disabled = true; btn.textContent = 'Generating…';
  for (let i = 0; i < SCREENS.length; i++) {
    setStatus('Downloading ' + (i + 1) + ' of ' + SCREENS.length + '…');
    await download('ss' + (i + 1), SCREENS[i].file, null);
    if (i < SCREENS.length - 1) await new Promise(r => setTimeout(r, 600));
  }
  btn.disabled = false; btn.textContent = 'Download All PNGs';
  setStatus('All ' + SCREENS.length + ' screenshots downloaded.');
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

buildSizeSelect();
buildCards();
</script>

</body>
</html>
